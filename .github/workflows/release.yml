name: Release

# По пушу тега вида vX.Y.Z: собрать ZIP аддона, создать GitHub Release и загрузить на CurseForge.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build addon zip
        id: build
        run: |
          version="${GITHUB_REF_NAME#v}"
          zip="Matreshka-${version}.zip"
          # только папки аддона, прямые слэши (как в ручной сборке) — без tools/.git/CI
          git archive --format=zip -o "$zip" HEAD Matreshka Matreshka_Options
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "zip=$zip" >> "$GITHUB_OUTPUT"

      - name: Extract release notes for this version
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="## $version" '
            $0 == v { grab = 1; next }
            /^## / && grab { exit }
            grab { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then echo "Подробности в CHANGELOG.md" > release-notes.md; fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${{ steps.build.outputs.zip }}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${{ steps.build.outputs.zip }}" \
              --title "Matreshka ${{ steps.build.outputs.version }}" \
              --notes-file release-notes.md
          fi

      - name: Upload to CurseForge
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CF_PROJECT_ID: ${{ secrets.CF_PROJECT_ID }}
          ZIP: ${{ steps.build.outputs.zip }}
        run: |
          set -euo pipefail
          if [ -z "${CF_API_KEY:-}" ] || [ -z "${CF_PROJECT_ID:-}" ]; then
            echo "Секреты CF_API_KEY / CF_PROJECT_ID не заданы — пропускаю загрузку на CurseForge."
            exit 0
          fi

          # id версии игры для TBC Classic 2.5.5 (на новых патчах поменять строку версии)
          versions="$(curl -sf -H "X-Api-Token: $CF_API_KEY" https://wow.curseforge.com/api/game/versions)"
          gv_id="$(printf '%s' "$versions" | python3 -c "import sys,json; d=json.load(sys.stdin); print(next(v['id'] for v in d if v['name']=='2.5.5'))")"
          echo "CurseForge game version id (2.5.5): $gv_id"

          metadata="$(GV="$gv_id" python3 -c "import json,os; print(json.dumps({'changelog': open('release-notes.md', encoding='utf-8').read(), 'changelogType': 'markdown', 'releaseType': 'release', 'gameVersions': [int(os.environ['GV'])]}))")"

          curl -sf -X POST "https://wow.curseforge.com/api/projects/${CF_PROJECT_ID}/upload-file" \
            -H "X-Api-Token: $CF_API_KEY" \
            -F "metadata=$metadata" \
            -F "file=@${ZIP}"
          echo "Загружено на CurseForge."
